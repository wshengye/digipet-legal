<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Digipet — Email Confirmed</title>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #fafafa; color: #1a1a1a; }
  body { font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  main { max-width: 480px; margin: 0 auto; padding: 80px 24px; text-align: center; }
  .check {
    width: 64px; height: 64px; margin: 0 auto 24px;
    border-radius: 50%; background: #0d6e5a;
    display: flex; align-items: center; justify-content: center;
  }
  .check svg { width: 32px; height: 32px; }
  h1 { margin: 0 0 12px; font-size: 22px; letter-spacing: 0.04em; text-transform: uppercase; color: #0d6e5a; }
  p { font-size: 15px; line-height: 1.6; color: #1a1a1a; margin: 0 0 16px; }
  .hint { font-size: 13px; color: #666; }
  footer.page { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e5e5e5; font-size: 12px; color: #888; }
  footer.page a { color: #555; text-decoration: none; }
</style>
</head>
<body>
<main>
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 13l4 4L19 7" stroke="#fafafa" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>Email Confirmed</h1>
  <p>Your email address has been verified. You can now open the Digipet app and sign in.</p>
  <p class="hint">You can safely close this tab.</p>
  <footer class="page">
    <a href="./index.html">Digipet legal &amp; privacy</a>
  </footer>
</main>
</body>
</html>
